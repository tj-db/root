<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AnimalMatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf6ec;
  --card:#ffffff; [cite: 3]
  --p1:#ff7043;
  --p2:#5c6bc0;
  --text:#2d2013;
  --border:rgba(45,32,19,0.10);
  --cell:58px;
  --gap:12px;
  --cols:7;
  --rows:5;
  --radius:12px;
  --shadow:0 2px 0 #e0c9a8,0 4px 16px rgba(45,32,19,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  font-family:'Nunito',sans-serif; [cite: 4]
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 16px 48px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,#e8d5bc 1px,transparent 1px);
  background-size:28px 28px;opacity:0.4;pointer-events:none;z-index:0; [cite: 5]
}
.wrap{position:relative;z-index:1;width:min(920px,100%);display:flex;flex-direction:column;align-items:center;gap:14px}
.board-row{display:flex;align-items:flex-start;gap:16px;width:100%;justify-content:center}
.score-side{width:11rem;display:flex;align-items:center;justify-content:center}
.score-num{font-family:'Fredoka',sans-serif;font-size:11rem;font-weight:700}
.score-left{color:var(--p1)}
.score-right{color:var(--p2)}
.grid-wrap{background:var(--card);border-radius:16px;border:2px solid var(--border);box-shadow:var(--shadow);padding:12px}
.grid{display:grid;grid-template-columns:repeat(var(--cols),var(--cell));grid-template-rows:repeat(var(--rows),var(--cell));gap:var(--gap)}
.cell{width:var(--cell);height:var(--cell);border-radius:var(--radius);background:var(--bg);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;user-select:none;position:relative}
.cell.p1{background:rgba(255,112,67,0.08);border:2px solid rgba(255,180,154,1)}
.cell.p2{background:rgba(92,107,192,0.08);border:2px solid rgba(159,168,218,1)}
.cell.preview{background:#fffde7;border:2px dashed #ffb347;font-size:14px}
@keyframes drop-in{0%{transform:translateY(-30px);opacity:0}65%{transform:translateY(5px)}100%{transform:translateY(0);opacity:1}}
.cell.dropped{animation:drop-in 0.2s ease-out}
@keyframes match-pop{0%{transform:scale(1)}35%{transform:scale(1.25);filter:brightness(1.2)}100%{transform:scale(0);opacity:0}}
.cell.matching{animation:match-pop 0.4s ease-in forwards;z-index:2}
.picker-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.picker{display:flex;align-items:center;justify-content:center;background:rgba(1,1,1,0);padding:12px 18px;min-width:220px}
.picker-name{font-family:'Fredoka',sans-serif;font-size:8rem;font-weight:700;color:var(--text);text-transform:capitalize}
.status{font-family:'Fredoka',sans-serif;font-size:16px;font-weight:500;color:var(--text);min-height:22px;text-align:center}
.btn{font-family:'Fredoka',sans-serif;font-size:15px;font-weight:500;padding:9px 22px;border-radius:50px;border:2px solid var(--border);cursor:pointer;background:var(--card);color:var(--text);box-shadow:var(--shadow);transition:all 0.15s}
.btn:hover{transform:translateY(-1px)}
.gameover{display:none;position:absolute;inset:0;background:rgba(253,246,236,0.93);border-radius:16px;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:10}
.gameover.show{display:flex}
.go-title{font-family:'Fredoka',sans-serif;font-size:34px;font-weight:600}
.go-score{font-size:18px;color:var(--text);font-weight:600}
.confetti-wrap{pointer-events:none;position:absolute;inset:0;overflow:hidden;z-index:20}
.confetti-piece{
  position:absolute;width:10px;height:14px;border-radius:2px;opacity:0.95;
  animation:confetti-fall linear forwards; [cite: 6]
}
@keyframes confetti-fall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0.9}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="picker-wrap">
    <div class="picker" id="picker">
      <div class="picker-name" id="pickerName">penguin</div>
    </div>
  </div>
  <div class="board-row">
    <div class="score-side" id="leftScoreWrap">
      <div class="score-num score-left" id="leftScore">0</div>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
      <div class="gameover" id="gameover">
        <div class="go-title" id="goTitle"></div>
        <div class="go-score" id="goScore"></div>
        <button class="btn" onclick="newGame()">Play again ↺</button> [cite: 7]
      </div>
      <div class="confetti-wrap" id="confettiWrap" aria-hidden="true"></div>
    </div>
    <div class="score-side" id="rightScoreWrap">
      <div class="score-num score-right" id="rightScore">0</div>
    </div>
  </div>
  <div class="status" id="status"></div>
  <div style="margin-top: 10px; opacity: 0.6; font-size: 13px;">Use Browser Back Button to Undo</div>
</div>

<script>
(function(){
  const COLS = 7, ROWS = 5, MATCH = 3;
  const ANIMALS = [
    {name:'penguin',emoji:'🐧'},
    {name:'giraffe',emoji:'🦒'},
    {name:'lion',emoji:'🦁'},
    {name:'tiger',emoji:'🐯'},
    {name:'bear',emoji:'🐻'},
    {name:'koala',emoji:'🐨'}
  ]; [cite: 8]
  const DIRS = [[0,1],[1,0],[1,1],[1,-1]]; [cite: 9]
  
  let grid, turn, scores, selected, busy;
  const gridEl = document.getElementById('grid');
  const pickerNameEl = document.getElementById('pickerName');
  const statusEl = document.getElementById('status'); [cite: 10]
  const leftScoreEl = document.getElementById('leftScore');
  const rightScoreEl = document.getElementById('rightScore');
  const gameoverEl = document.getElementById('gameover');
  const goTitleEl = document.getElementById('goTitle');
  const goScoreEl = document.getElementById('goScore'); [cite: 11]
  const confettiWrap = document.getElementById('confettiWrap');

  function init(){
    grid = Array.from({length:ROWS},()=>Array(COLS).fill(null)); [cite: 11]
    turn = 1;
    scores = [0,0]; [cite: 12]
    selected = null;
    busy = false;

    // Set initial state for the browser back button
    saveState(true);
  }

  // --- NEW UNDO LOGIC ---
  function saveState(replace = false) {
    const state = {
      grid: JSON.parse(JSON.stringify(grid)),
      turn: turn,
      scores: [...scores],
      selected: selected ? {...selected} : null
    };
    if (replace) {
      history.replaceState(state, "");
    } else {
      history.pushState(state, "");
    }
  }

  window.addEventListener('popstate', (event) => {
    if (event.state) {
      grid = event.state.grid;
      turn = event.state.turn;
      scores = event.state.scores;
      selected = event.state.selected;
      
      busy = false; // Allow interaction again
      syncAll();
      updateScores();
      updatePickerDisplay();
      setStatus();
      gameoverEl.classList.remove('show');
    }
  });
  // ----------------------

  function buildUI(){
    gridEl.innerHTML = ''; [cite: 13]
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const el = document.createElement('div');
        el.className = 'cell'; [cite: 14]
        el.id = `c${r}_${c}`;
        el.addEventListener('click', ()=>drop(c));
        el.addEventListener('mouseenter', ()=>showPreview(c));
        el.addEventListener('mouseleave', ()=>clearPreview());
        gridEl.appendChild(el); [cite: 15]
      }
    }
  }

  function cel(r,c){ return document.getElementById(`c${r}_${c}`); [cite: 16] }

  function syncCell(r,c,extra=''){
    const el = cel(r,c);
    if(!el) return;
    const d = grid[r][c];
    if(!d){ el.className='cell'; el.textContent=''; [cite: 17] }
    else { el.className=`cell p${d.p}${extra?' '+extra:''}`; el.textContent=d.e; [cite: 18] }
  }

  function syncAll(){ for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) syncCell(r,c); [cite: 19] }

  function autoPick(){
    const idx = Math.floor(Math.random()*ANIMALS.length);
    const a = ANIMALS[idx];
    selected = a;
    updatePickerDisplay(); [cite: 20]
  }

  function updatePickerDisplay(){
    if(selected){
      pickerNameEl.textContent = selected.name; [cite: 21]
      pickerNameEl.style.color = turn === 1 ? 'var(--p1)' : 'var(--p2)';
    } else {
      pickerNameEl.textContent = ''; [cite: 22]
    }
  }

  let previewRow = -1, previewCol = -1;

  function showPreview(col){
    if(busy || !selected) return; [cite: 23]
    clearPreview();
    let row = -1;
    for(let r=ROWS-1;r>=0;r--){ if(!grid[r][col]){row=r;break;} }
    if(row===-1) return;
    previewRow = row; previewCol = col; [cite: 24]
    const el = cel(row,col);
    el.className = 'cell preview';
    el.textContent = selected.name; [cite: 25]
  }

  function clearPreview(){
    if(previewRow>=0 && previewCol>=0){
      const el = cel(previewRow,previewCol); [cite: 26]
      if(el && el.classList.contains('preview')){ el.className='cell'; el.textContent=''; }
    }
    previewRow = -1; previewCol = -1; [cite: 27]
  }

  function drop(col){
    if(busy) return;
    if(!selected){ autoPick(); return; }
    let row = -1; [cite: 28]
    for(let r=ROWS-1;r>=0;r--){ if(!grid[r][col]){row=r;break;} }
    if(row===-1){ setStatus(); return; }

    // Save current state before modifying grid to allow back-button undo
    saveState();

    clearPreview();
    busy = true; [cite: 29]
    grid[row][col] = {e:selected.emoji, p:turn};
    syncCell(row,col,'dropped');
    if(row === 0){
      setTimeout(()=>endGame(), 230);
      return; [cite: 30]
    }
    setTimeout(()=>resolveMatches(),230);
  }

  function findMatches(){
    const hit = new Set(); [cite: 31]
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      if(!grid[r][c]) continue;
      const emoji = grid[r][c].e; [cite: 32]
      for(const [dr,dc] of DIRS){
        const line = []; [cite: 33]
        for(let i=0;i<MATCH;i++){
          const nr = r+dr*i, nc = c+dc*i;
          if(nr<0||nr>=ROWS||nc<0||nc>=COLS) break; [cite: 34]
          if(grid[nr][nc] && grid[nr][nc].e === emoji) line.push(`${nr},${nc}`);
          else break;
        }
        if(line.length>=MATCH) line.forEach(k=>hit.add(k)); [cite: 35]
      }
    }
    return hit; [cite: 36]
  }

  function resolveMatches(){
    const hit = findMatches();
    if(!hit.size){ nextTurn(); return; }
    scores[turn-1]++;
    updateScores(); [cite: 37]
    hit.forEach(k=>{
      const [r,c] = k.split(',').map(Number);
      const el = cel(r,c);
      if(el) el.classList.add('matching');
    }); [cite: 38]
    setTimeout(()=>{
      hit.forEach(k=>{
        const [r,c] = k.split(',').map(Number);
        grid[r][c] = null;
      });
      applyGravity();
      syncAll();
      setTimeout(()=>resolveMatches(),140);
    },420); [cite: 39]
  }

  function applyGravity(){
    for(let c=0;c<COLS;c++){
      const stack = []; [cite: 40]
      for(let r=ROWS-1;r>=0;r--) if(grid[r][c]) stack.push(grid[r][c]);
      for(let r=ROWS-1;r>=0;r--) grid[r][c] = stack.length ? stack.shift() : null; [cite: 41]
    }
  }

  function nextTurn(){
    if(grid[0].some(c=>c!==null)){ endGame(); return; }
    turn = turn===1 ? 2 : 1; [cite: 42]
    selected = null;
    autoPick();
    setStatus();
    setTimeout(() => { busy = false; }, 300); [cite: 43]
  }

  function updateScores(){
    leftScoreEl.textContent = scores[0];
    rightScoreEl.textContent = scores[1]; [cite: 44]
  }

  function setStatus(){
    statusEl.className = `status p${turn}`; [cite: 45]
  }

  function spawnConfetti(count = 80){
    confettiWrap.innerHTML = '';
    const colors = ['#ff6b6b','#ffd166','#6bcB77','#4d96ff','#b388ff','#ff9f1c']; [cite: 46]
    const width = confettiWrap.clientWidth || window.innerWidth;
    for(let i=0;i<count;i++){
      const el = document.createElement('div');
      el.className = 'confetti-piece'; [cite: 47]
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.left = Math.random()*100 + '%';
      el.style.top = (Math.random()*-20) + 'vh';
      el.style.width = (8 + Math.random()*8) + 'px'; [cite: 48]
      el.style.height = (10 + Math.random()*12) + 'px';
      el.style.opacity = 0.95;
      el.style.animationDuration = (2 + Math.random()*2.5) + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`; [cite: 49]
      confettiWrap.appendChild(el);
      setTimeout(()=>{ if(el && el.parentNode) el.parentNode.removeChild(el); }, 7000);
    }
  }

  function endGame(){
    busy = true; [cite: 50]
    pickerNameEl.textContent = 'GOOD GAME!';
    pickerNameEl.style.color = '#2d2013';
    spawnConfetti(120);
    const [s1,s2] = scores;
    if(s1>s2){ goTitleEl.textContent = '🔴 Red Team wins!'; [cite: 51] }
    else if(s2>s1){ goTitleEl.textContent = '🔵 Blue Team wins!'; [cite: 52] }
    else { goTitleEl.textContent = "It's a tie! 🤝"; [cite: 53] }
    goScoreEl.textContent = `${s1} – ${s2} matches`;
    gameoverEl.classList.add('show');
  }

  window.newGame = function(){
    gameoverEl.classList.remove('show'); [cite: 54]
    confettiWrap.innerHTML = '';
    init();
    buildUI();
    updateScores();
    autoPick();
    setStatus();
  };

  init();
  buildUI();
  autoPick();
  setStatus();
})();
</script>
</body>
</html>
