<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minefield Maze</title>

<style>
body{
    font-family:Arial, sans-serif;
    text-align:center;
    background:#1e1e1e;
    color:white;
}

h1{
    margin-top:20px;
}

#game{
    display:grid;
    margin:20px auto;
    gap:3px;
    width:max-content;
}

.cell{
    width:44px;
    height:44px;
    background:#444;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.cell.red{
    background:#e74c3c;
}

.cell.blue{
    background:#3498db;
}

.cell.explode{
    background:#ff6b6b;
}

#status{
    font-size:20px;
    margin:10px;
}

button{
    padding:10px 18px;
    font-size:16px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>💣 Minefield Maze</h1>
<p>Reach the opposite side without stepping on a hidden bomb.</p>

<div id="status"></div>
<div id="game"></div>

<button onclick="resetGame()">Restart Game</button>

<script>

const rows = 8
const cols = 12
const bombCount = 18

let bombs = new Set()
let safePath = new Set()

let redPos
let bluePos

let turn = "red"
let gameOver = false

const game = document.getElementById("game")
const status = document.getElementById("status")

function key(x,y){
    return x+","+y
}

function generateSafePath(){

    safePath.clear()

    let y = Math.floor(rows/2)

    for(let x=0; x<cols; x++){

        safePath.add(key(x,y))

        const move = Math.floor(Math.random()*3)

        if(move===1 && y>0) y--
        if(move===2 && y<rows-1) y++
    }
}

function generateBombs(){

    bombs.clear()

    while(bombs.size < bombCount){

        let x = Math.floor(Math.random()*cols)
        let y = Math.floor(Math.random()*rows)

        if(safePath.has(key(x,y))) continue

        if((x===0 && y===redPos.y) || (x===cols-1 && y===bluePos.y))
            continue

        bombs.add(key(x,y))
    }
}

function createGrid(){

    game.innerHTML=""
    game.style.gridTemplateColumns = `repeat(${cols},44px)`

    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){

            const cell = document.createElement("div")
            cell.className="cell"
            cell.dataset.x=x
            cell.dataset.y=y

            cell.onclick = () => move(x,y)

            game.appendChild(cell)
        }
    }
}

function draw(){

    document.querySelectorAll(".cell").forEach(c=>{
        c.classList.remove("red","blue","explode")
        c.textContent=""
    })

    const redCell = document.querySelector(`[data-x="${redPos.x}"][data-y="${redPos.y}"]`)
    redCell.classList.add("red")
    redCell.textContent="R"

    const blueCell = document.querySelector(`[data-x="${bluePos.x}"][data-y="${bluePos.y}"]`)
    blueCell.classList.add("blue")
    blueCell.textContent="B"

    if(!gameOver){
        status.textContent = turn==="red" ? "🔴 Red Team Turn" : "🔵 Blue Team Turn"
    }
}

function resetGame(){

    redPos = {x:0, y:Math.floor(rows/2)}
    bluePos = {x:cols-1, y:Math.floor(rows/2)}

    turn="red"
    gameOver=false

    generateSafePath()
    generateBombs()

    createGrid()
    draw()
}

function explode(x,y){

    const cell = document.querySelector(`[data-x="${x}"][data-y="${y}"]`)
    cell.classList.add("explode")
    cell.textContent="💥"

    setTimeout(()=>{

        if(turn==="red")
            redPos = {x:0,y:Math.floor(rows/2)}
        else
            bluePos = {x:cols-1,y:Math.floor(rows/2)}

        turn = turn==="red" ? "blue" : "red"

        draw()

    },700)
}

function move(x,y){

    if(gameOver) return

    const pos = turn==="red" ? redPos : bluePos

    const dx = Math.abs(x-pos.x)
    const dy = Math.abs(y-pos.y)

    if(dx+dy !== 1) return

    if(turn==="red") redPos = {x,y}
    else bluePos = {x,y}

    if(bombs.has(key(x,y))){
        explode(x,y)
        return
    }

    if(turn==="red" && x===cols-1){
        status.textContent="🏆 RED TEAM WINS!"
        gameOver=true
    }

    if(turn==="blue" && x===0){
        status.textContent="🏆 BLUE TEAM WINS!"
        gameOver=true
    }

    turn = turn==="red" ? "blue" : "red"

    draw()
}

resetGame()

</script>

</body>
</html>
